name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      env:
        PUPPETEER_SKIP_DOWNLOAD: 1
      run: npm ci
      
    - name: Type Check
      run: npm run type-check
      
    - name: Test
      run: npm test
      
    - name: Build
      run: npm run build
      
    - name: Check dist/ drift
      run: git diff --exit-code -- dist/
      
    - name: Pack check
      run: npm run pack:check
