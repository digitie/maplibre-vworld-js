name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PUPPETEER_SKIP_DOWNLOAD: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      # `dist/` is committed so GitHub-URL consumers can install without a build
      # step. Fail the build if the checked-in artifacts drift from `src/`.
      - name: Verify dist/ is in sync with src/
        run: |
          if ! git diff --exit-code -- dist/; then
            echo ""
            echo "::error::dist/ is out of sync with src/. Run 'npm run build' and commit the result."
            exit 1
          fi

      - name: Pack check
        run: npm run pack:check
